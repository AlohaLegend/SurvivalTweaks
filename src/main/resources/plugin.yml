name: SurvivalTweaks
version: 2.1.1
main: com.alohalegend.survivaltweaks.SurvivalTweaksPlugin
api-version: "1.21"
author: AlohaLegend
description: Small survival quality-of-life tweaks.

commands:
  biome:
    description: Shows the biome you are standing in.
    usage: "/biome"
  platform:
    description: Shows whether a player is marked as Bedrock or Java.
    usage: "/platform <player>"
  survivaltweaks:
    aliases: [stw]
    description: SurvivalTweaks admin command
    usage: "/survivaltweaks <help|reload|status>"
    permission: survivaltweaks.admin

permissions:
  survivaltweaks.biome:
    description: Allows use of /biome.
    default: true
  survivaltweaks.admin:
    description: Allows viewing SurvivalTweaks help/status and reloading its config.
    default: op
  survivaltweaks.spawner.bypass:
    description: Bypasses spawner proximity placement protection.
    default: op
